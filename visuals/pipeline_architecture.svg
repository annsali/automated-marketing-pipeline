<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sourceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="extractGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="transformGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="warehouseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e7490;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="qualityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="reportGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6" opacity="0.8"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="630" x2="1200" y2="630"/>
  </g>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#f1f5f9" letter-spacing="0.5">Automated Marketing Data Pipeline</text>
  <text x="600" y="72" text-anchor="middle" font-size="13" fill="#64748b" letter-spacing="1">ETL · Data Quality · Anomaly Detection · Automated Reporting</text>

  <!-- ============ ROW 1: DATA SOURCES ============ -->
  <text x="60" y="118" font-size="10" font-weight="600" fill="#475569" letter-spacing="2" text-transform="uppercase">DATA SOURCES</text>

  <!-- CRM -->
  <g filter="url(#shadow)">
    <rect x="40" y="128" width="130" height="72" rx="10" fill="url(#sourceGrad)" stroke="#334155" stroke-width="1.5"/>
    <rect x="40" y="128" width="130" height="4" rx="2" fill="#e11d48"/>
    <text x="105" y="158" text-anchor="middle" font-size="20">🏢</text>
    <text x="105" y="177" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Salesforce CRM</text>
    <text x="105" y="191" text-anchor="middle" font-size="10" fill="#64748b">30K accounts</text>
  </g>

  <!-- Meta Ads -->
  <g filter="url(#shadow)">
    <rect x="196" y="128" width="130" height="72" rx="10" fill="url(#sourceGrad)" stroke="#334155" stroke-width="1.5"/>
    <rect x="196" y="128" width="130" height="4" rx="2" fill="#1877f2"/>
    <text x="261" y="158" text-anchor="middle" font-size="20">📱</text>
    <text x="261" y="177" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Meta Ads</text>
    <text x="261" y="191" text-anchor="middle" font-size="10" fill="#64748b">40 campaigns</text>
  </g>

  <!-- Google Ads -->
  <g filter="url(#shadow)">
    <rect x="352" y="128" width="130" height="72" rx="10" fill="url(#sourceGrad)" stroke="#334155" stroke-width="1.5"/>
    <rect x="352" y="128" width="130" height="4" rx="2" fill="#4285f4"/>
    <text x="417" y="158" text-anchor="middle" font-size="20">🔍</text>
    <text x="417" y="177" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Google Ads</text>
    <text x="417" y="191" text-anchor="middle" font-size="10" fill="#64748b">30 campaigns</text>
  </g>

  <!-- GA4 -->
  <g filter="url(#shadow)">
    <rect x="508" y="128" width="130" height="72" rx="10" fill="url(#sourceGrad)" stroke="#334155" stroke-width="1.5"/>
    <rect x="508" y="128" width="130" height="4" rx="2" fill="#e37400"/>
    <text x="573" y="158" text-anchor="middle" font-size="20">📊</text>
    <text x="573" y="177" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Google Analytics 4</text>
    <text x="573" y="191" text-anchor="middle" font-size="10" fill="#64748b">500K sessions</text>
  </g>

  <!-- Email Platform -->
  <g filter="url(#shadow)">
    <rect x="664" y="128" width="130" height="72" rx="10" fill="url(#sourceGrad)" stroke="#334155" stroke-width="1.5"/>
    <rect x="664" y="128" width="130" height="4" rx="2" fill="#7c3aed"/>
    <text x="729" y="158" text-anchor="middle" font-size="20">📧</text>
    <text x="729" y="177" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Email Platform</text>
    <text x="729" y="191" text-anchor="middle" font-size="10" fill="#64748b">800K sends</text>
  </g>

  <!-- ============ ARROWS: Sources → Extract ============ -->
  <g stroke="#3b82f6" stroke-width="1.5" opacity="0.5" fill="none" stroke-dasharray="4,3">
    <line x1="105" y1="200" x2="105" y2="248"/>
    <line x1="261" y1="200" x2="215" y2="248"/>
    <line x1="417" y1="200" x2="325" y2="248"/>
    <line x1="573" y1="200" x2="435" y2="248"/>
    <line x1="729" y1="200" x2="545" y2="248"/>
  </g>
  <!-- Arrow heads -->
  <polygon points="100,244 105,254 110,244" fill="#3b82f6" opacity="0.6"/>
  <polygon points="210,244 215,254 220,244" fill="#3b82f6" opacity="0.6"/>
  <polygon points="320,244 325,254 330,244" fill="#3b82f6" opacity="0.6"/>
  <polygon points="430,244 435,254 440,244" fill="#3b82f6" opacity="0.6"/>
  <polygon points="540,244 545,254 550,244" fill="#3b82f6" opacity="0.6"/>

  <!-- ============ ROW 2: EXTRACT + TRANSFORM ============ -->

  <!-- EXTRACT box -->
  <g filter="url(#shadow)">
    <rect x="40" y="254" width="290" height="88" rx="12" fill="url(#extractGrad)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="185" y="282" text-anchor="middle" font-size="11" font-weight="700" fill="#bfdbfe" letter-spacing="2">EXTRACT</text>
    <text x="185" y="302" text-anchor="middle" font-size="12" fill="#dbeafe">Simulated API calls · Retry logic (3x)</text>
    <text x="185" y="320" text-anchor="middle" font-size="12" fill="#dbeafe">Schema validation · Raw CSV backup</text>
    <text x="185" y="334" text-anchor="middle" font-size="11" fill="#93c5fd">5% failure rate → exponential backoff</text>
  </g>

  <!-- Arrow Extract → Transform -->
  <line x1="330" y1="298" x2="378" y2="298" stroke="#3b82f6" stroke-width="2" opacity="0.7" marker-end="url(#arrowBlue)"/>

  <!-- TRANSFORM box -->
  <g filter="url(#shadow)">
    <rect x="386" y="254" width="340" height="88" rx="12" fill="url(#transformGrad)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="556" y="282" text-anchor="middle" font-size="11" font-weight="700" fill="#ddd6fe" letter-spacing="2">TRANSFORM</text>
    <text x="556" y="302" text-anchor="middle" font-size="12" fill="#ede9fe">Schema standardize · Type cast · UTC normalize</text>
    <text x="556" y="320" text-anchor="middle" font-size="12" fill="#ede9fe">Dedup · Null handling · Channel grouping</text>
    <text x="556" y="334" text-anchor="middle" font-size="11" fill="#c4b5fd">Identity resolution: CRM ↔ GA4 ↔ Email ↔ Ads</text>
  </g>

  <!-- ============ ARROW: Transform → Warehouse ============ -->
  <line x1="556" y1="342" x2="556" y2="388" stroke="#8b5cf6" stroke-width="2" opacity="0.7"/>
  <polygon points="551,384 556,394 561,384" fill="#8b5cf6" opacity="0.7"/>

  <!-- ============ ROW 3: WAREHOUSE ============ -->
  <g filter="url(#shadow)">
    <rect x="90" y="394" width="930" height="108" rx="14" fill="url(#warehouseGrad)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="555" y="420" text-anchor="middle" font-size="11" font-weight="700" fill="#cffafe" letter-spacing="2">UNIFIED DATA WAREHOUSE  ·  SQLite  ·  Star Schema</text>

    <!-- Fact tables -->
    <rect x="115" y="430" width="155" height="30" rx="6" fill="rgba(0,0,0,0.25)" stroke="#0e7490" stroke-width="1"/>
    <text x="192" y="450" text-anchor="middle" font-size="11" fill="#a5f3fc" font-weight="600">fact_ad_performance</text>

    <rect x="280" y="430" width="145" height="30" rx="6" fill="rgba(0,0,0,0.25)" stroke="#0e7490" stroke-width="1"/>
    <text x="352" y="450" text-anchor="middle" font-size="11" fill="#a5f3fc" font-weight="600">fact_web_sessions</text>

    <rect x="435" y="430" width="160" height="30" rx="6" fill="rgba(0,0,0,0.25)" stroke="#0e7490" stroke-width="1"/>
    <text x="515" y="450" text-anchor="middle" font-size="11" fill="#a5f3fc" font-weight="600">fact_email_engagement</text>

    <rect x="605" y="430" width="145" height="30" rx="6" fill="rgba(0,0,0,0.25)" stroke="#0e7490" stroke-width="1"/>
    <text x="677" y="450" text-anchor="middle" font-size="11" fill="#a5f3fc" font-weight="600">fact_crm_activities</text>

    <rect x="760" y="430" width="120" height="30" rx="6" fill="rgba(0,0,0,0.25)" stroke="#0e7490" stroke-width="1"/>
    <text x="820" y="450" text-anchor="middle" font-size="11" fill="#a5f3fc" font-weight="600">fact_pipeline</text>

    <!-- Dim tables -->
    <rect x="115" y="468" width="118" height="26" rx="6" fill="rgba(255,255,255,0.06)" stroke="#164e63" stroke-width="1"/>
    <text x="174" y="485" text-anchor="middle" font-size="10" fill="#67e8f9">dim_accounts</text>

    <rect x="243" y="468" width="118" height="26" rx="6" fill="rgba(255,255,255,0.06)" stroke="#164e63" stroke-width="1"/>
    <text x="302" y="485" text-anchor="middle" font-size="10" fill="#67e8f9">dim_contacts</text>

    <rect x="371" y="468" width="118" height="26" rx="6" fill="rgba(255,255,255,0.06)" stroke="#164e63" stroke-width="1"/>
    <text x="430" y="485" text-anchor="middle" font-size="10" fill="#67e8f9">dim_campaigns</text>

    <rect x="499" y="468" width="100" height="26" rx="6" fill="rgba(255,255,255,0.06)" stroke="#164e63" stroke-width="1"/>
    <text x="549" y="485" text-anchor="middle" font-size="10" fill="#67e8f9">dim_dates</text>

    <text x="755" y="481" text-anchor="middle" font-size="10" fill="#22d3ee" font-weight="600">Incremental upsert</text>
    <text x="755" y="494" text-anchor="middle" font-size="10" fill="#22d3ee">Idempotent · Hash diff</text>
  </g>

  <!-- ============ ARROWS: Warehouse → DQ + Reporting ============ -->
  <line x1="280" y1="502" x2="200" y2="548" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
  <polygon points="195,544 200,554 205,544" fill="#22d3ee" opacity="0.6"/>

  <line x1="830" y1="502" x2="900" y2="548" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
  <polygon points="895,544 900,554 905,544" fill="#22d3ee" opacity="0.6"/>

  <!-- ============ ROW 4: DQ + REPORTING ============ -->

  <!-- DQ + Anomaly box -->
  <g filter="url(#shadow)">
    <rect x="40" y="554" width="400" height="108" rx="12" fill="url(#qualityGrad)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="240" y="578" text-anchor="middle" font-size="11" font-weight="700" fill="#fef3c7" letter-spacing="2">DATA QUALITY  +  ANOMALY DETECTION</text>

    <!-- DQ checks column -->
    <text x="140" y="598" text-anchor="middle" font-size="10" fill="#fde68a" font-weight="600">12 Automated Checks</text>
    <text x="140" y="614" text-anchor="middle" font-size="10" fill="#fcd34d">Completeness · Freshness</text>
    <text x="140" y="628" text-anchor="middle" font-size="10" fill="#fcd34d">Volume · Schema · Uniqueness</text>
    <text x="140" y="642" text-anchor="middle" font-size="10" fill="#fcd34d">Score 0–100 · PASS / WARN / FAIL</text>

    <!-- Divider -->
    <line x1="240" y1="590" x2="240" y2="650" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>

    <!-- Anomaly detection column -->
    <text x="330" y="598" text-anchor="middle" font-size="10" fill="#fde68a" font-weight="600">Statistical Anomaly Detection</text>
    <text x="330" y="614" text-anchor="middle" font-size="10" fill="#fcd34d">Z-score  ·  IQR  ·  CUSUM</text>
    <text x="330" y="628" text-anchor="middle" font-size="10" fill="#fcd34d">7 key marketing metrics</text>
    <text x="330" y="642" text-anchor="middle" font-size="10" fill="#fcd34d">Auto-alert on critical anomalies</text>
  </g>

  <!-- REPORTING box -->
  <g filter="url(#shadow)">
    <rect x="760" y="554" width="400" height="108" rx="12" fill="url(#reportGrad)" stroke="#34d399" stroke-width="1.5"/>
    <text x="960" y="578" text-anchor="middle" font-size="11" font-weight="700" fill="#d1fae5" letter-spacing="2">AUTOMATED REPORTING</text>

    <!-- Daily -->
    <rect x="780" y="588" width="105" height="58" rx="8" fill="rgba(0,0,0,0.2)" stroke="#065f46" stroke-width="1"/>
    <text x="832" y="607" text-anchor="middle" font-size="18">📅</text>
    <text x="832" y="625" text-anchor="middle" font-size="11" font-weight="600" fill="#6ee7b7">Daily Pulse</text>
    <text x="832" y="639" text-anchor="middle" font-size="10" fill="#a7f3d0">Spend · Traffic</text>

    <!-- Weekly -->
    <rect x="898" y="588" width="105" height="58" rx="8" fill="rgba(0,0,0,0.2)" stroke="#065f46" stroke-width="1"/>
    <text x="950" y="607" text-anchor="middle" font-size="18">📆</text>
    <text x="950" y="625" text-anchor="middle" font-size="11" font-weight="600" fill="#6ee7b7">Weekly Summary</text>
    <text x="950" y="639" text-anchor="middle" font-size="10" fill="#a7f3d0">WoW · Funnel</text>

    <!-- Monthly -->
    <rect x="1016" y="588" width="125" height="58" rx="8" fill="rgba(0,0,0,0.2)" stroke="#065f46" stroke-width="1"/>
    <text x="1078" y="607" text-anchor="middle" font-size="18">📋</text>
    <text x="1078" y="625" text-anchor="middle" font-size="11" font-weight="600" fill="#6ee7b7">Monthly Executive</text>
    <text x="1078" y="639" text-anchor="middle" font-size="10" fill="#a7f3d0">YoY · Attribution</text>
  </g>

  <!-- ============ ORCHESTRATOR badge ============ -->
  <g filter="url(#shadow)">
    <rect x="468" y="554" width="264" height="108" rx="12" fill="rgba(15,20,30,0.9)" stroke="#334155" stroke-width="1.5"/>
    <text x="600" y="580" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">ORCHESTRATOR</text>
    <text x="600" y="600" text-anchor="middle" font-size="11" fill="#64748b">7-stage execution pipeline</text>
    <text x="600" y="618" text-anchor="middle" font-size="11" fill="#64748b">Retry logic · Checkpointing</text>
    <text x="600" y="636" text-anchor="middle" font-size="11" fill="#64748b">Execution manifest (JSON)</text>
    <text x="600" y="652" text-anchor="middle" font-size="11" fill="#64748b">Structured logging · Alerting</text>
  </g>

  <!-- ============ STATS BAR at bottom ============ -->
  <rect x="0" y="690" width="1200" height="30" fill="rgba(0,0,0,0.35)"/>

  <text x="80" y="710" text-anchor="middle" font-size="11" fill="#475569">🐍 Python 3.11</text>
  <text x="220" y="710" text-anchor="middle" font-size="11" fill="#475569">🗄️ SQLite · Star Schema</text>
  <text x="380" y="710" text-anchor="middle" font-size="11" fill="#475569">⚗️ 5 Data Sources</text>
  <text x="530" y="710" text-anchor="middle" font-size="11" fill="#475569">✅ 58 Tests Passing</text>
  <text x="690" y="710" text-anchor="middle" font-size="11" fill="#475569">📊 3.8M+ Records</text>
  <text x="840" y="710" text-anchor="middle" font-size="11" fill="#475569">🔍 12 DQ Checks</text>
  <text x="990" y="710" text-anchor="middle" font-size="11" fill="#475569">📈 3 Report Cadences</text>
  <text x="1130" y="710" text-anchor="middle" font-size="11" fill="#334155">by Anns Ali Syed</text>

  <!-- Dividers in stats bar -->
  <line x1="145" y1="694" x2="145" y2="718" stroke="#1e293b" stroke-width="1"/>
  <line x1="300" y1="694" x2="300" y2="718" stroke="#1e293b" stroke-width="1"/>
  <line x1="450" y1="694" x2="450" y2="718" stroke="#1e293b" stroke-width="1"/>
  <line x1="605" y1="694" x2="605" y2="718" stroke="#1e293b" stroke-width="1"/>
  <line x1="755" y1="694" x2="755" y2="718" stroke="#1e293b" stroke-width="1"/>
  <line x1="905" y1="694" x2="905" y2="718" stroke="#1e293b" stroke-width="1"/>
  <line x1="1060" y1="694" x2="1060" y2="718" stroke="#1e293b" stroke-width="1"/>
</svg>
